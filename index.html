<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Young Legal House | Home</title>
<link rel="stylesheet" href="style.css?v=37">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>

/* ===== CLEAN STICKY HEADER SYSTEM ===== */

body {
    padding-top: 110px; /* SINGLE source of spacing */
}

/* Wrapper */
.ylh-header {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    z-index: 9999;
    display: flex;
    justify-content: center;
    pointer-events: none;
}

/* Inner container */
.ylh-header-inner {
    width: 100%;
    max-width: 1400px;
    position: relative;
    padding: 15px 30px;
}

/* LOGO */
.sticky-logo {
    position: absolute;
    left: 30px;
    top: 10px;
    pointer-events: auto;
}
.sticky-logo img {
    height: 140px;
}
body.light-mode .sticky-logo img {
    filter: brightness(0);
}

/* THEME TOGGLE */
.sticky-theme-toggle {
    position: absolute;
    right: 30px;
    top: 15px;
    width: 55px;
    height: 55px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    cursor: pointer;
    pointer-events: auto;
}
body.light-mode .sticky-theme-toggle {
    background: rgba(0,0,0,0.05);
    color: black;
}

/* CENTER ISLAND */
.sticky-island {
    margin: 0 auto;
    width: 850px;
    max-width: 90%;
    height: 60px;
    border-radius: 100px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 40px;
    pointer-events: auto;

    background: rgba(30,30,30,0.9);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.1);
}

body.light-mode .sticky-island {
    background: rgba(255,255,255,0.9);
}

/* TEXT */
.island-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: 2px;
    color: white;
    text-decoration: none;
}
body.light-mode .island-title {
    color: black;
}

.island-nav {
    display: flex;
    gap: 25px;
    align-items: center;
}

.island-nav a,
.island-nav button {
    color: white;
    text-decoration: none;
    font-weight: 600;
    background: none;
    border: none;
    cursor: pointer;
}
body.light-mode .island-nav a,
body.light-mode .island-nav button {
    color: black;
}

/* DROPDOWN */
.dropdown-menu {
    position: absolute;
    top: 55px;
    right: 0;
    display: none;
    flex-direction: column;
    background: rgba(20,20,20,0.95);
    border-radius: 12px;
    padding: 10px;
}
.dropdown-menu.show {
    display: flex;
}

/* MOBILE */
@media (max-width: 768px) {

    body { padding-top: 140px; }

    .sticky-logo img { height: 90px; }

    .sticky-island {
        margin-top: 80px;
        width: 95%;
    }
}

</style>
</head>
<body class="dark-mode">
<!-- HEADER -->
<div class="ylh-header">
    <div class="ylh-header-inner">
    <a href="index.html" class="sticky-logo">
        <img src="logoylh.png">
    </a>

    <div class="sticky-island">
        <a href="index.html" class="island-title">YOUNG LEGAL HOUSE</a>

        <nav class="island-nav">
            <a href="blogs.html">Blogs</a>
            <a href="events.html">Events</a>

            <div class="menu-wrapper">
                <button id="menuToggleBtn"><i class="fas fa-bars"></i></button>

                <div class="dropdown-menu" id="dropdownMenuContainer">
                    <a href="about.html">About</a>
                    <a href="team.html">Team</a>
                    <a href="join.html">Join Us</a>
                    <a href="contact.html">Contact</a>
                </div>
            </div>
        </nav>
    </div>

    <button class="sticky-theme-toggle" id="themeToggle">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

</div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {

    const menuBtn = document.getElementById('menuToggleBtn');
    const dropMenu = document.getElementById('dropdownMenuContainer');

    menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropMenu.classList.toggle('show');
    });

    document.addEventListener('click', (e) => {
        if (!dropMenu.contains(e.target) && !menuBtn.contains(e.target)) {
            dropMenu.classList.remove('show');
        }
    });

    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const body = document.body;

    const currentTheme = localStorage.getItem('ylh_theme');

    if (currentTheme === 'light') {
        body.classList.add('light-mode');
        themeIcon.classList.replace('fa-moon', 'fa-sun');
    }

    themeToggle.addEventListener('click', () => {
        if (body.classList.contains('light-mode')) {
            body.classList.remove('light-mode');
            themeIcon.classList.replace('fa-sun', 'fa-moon');
            localStorage.setItem('ylh_theme', 'dark');
        } else {
            body.classList.add('light-mode');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
            localStorage.setItem('ylh_theme', 'light');
        }
    });

});
</script>
<!-- KEEP YOUR EXISTING MAIN + FOOTER BELOW -->
</body>
</html>
