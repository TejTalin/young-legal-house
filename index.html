<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Young Legal House | Home</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --bg-dark: #050505; --surface: #121212; --surface-hover: #1a1a1a; --text-main: #ffffff; --text-muted: #888888; --accent: #ffffff; --border: #222222; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-dark); color: var(--text-main); line-height: 1.6; scroll-behavior: smooth; overflow-x: hidden; }
        h1, h2, h3, .brand { font-family: 'Space Grotesk', sans-serif; text-transform: uppercase; letter-spacing: -0.5px; }
        a { text-decoration: none; color: inherit; transition: all 0.3s ease; }

        nav { position: fixed; top: 0; width: 100%; z-index: 1000; background: rgba(5, 5, 5, 0.7); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; padding: 1.2rem 5%; }
        .brand { font-size: 1.5rem; font-weight: 700; letter-spacing: 2px; }
        .nav-links { display: flex; gap: 2.5rem; }
        .nav-links a { font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-muted); }
        .nav-links a:hover { color: var(--accent); }

        header { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 0 5%; background: linear-gradient(rgba(5, 5, 5, 0.8), rgba(5, 5, 5, 0.95)), url('https://images.unsplash.com/photo-1589829085413-56de8ae18c73?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover; }
        .hero-title { font-size: clamp(3rem, 7vw, 6rem); font-weight: 700; line-height: 1; margin-bottom: 1.5rem; text-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .hero-subtitle { font-family: 'Space Grotesk', sans-serif; font-size: clamp(1rem, 2vw, 1.2rem); color: #ccc; letter-spacing: 2px; margin-bottom: 3rem; text-transform: uppercase; max-width: 800px; line-height: 1.8; }
        
        section { padding: 8rem 5%; max-width: 1400px; margin: 0 auto; border-bottom: 1px solid var(--border); }
        .section-header { font-size: 2.5rem; margin-bottom: 4rem; text-align: center; color: var(--text-main); }
        
        .grid { display: grid; gap: 2rem; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }
        
        .card { background: linear-gradient(145deg, var(--surface), #0a0a0a); padding: 2.5rem; border: 1px solid var(--border); border-radius: 16px; transition: transform 0.4s ease, border-color 0.4s ease; display: flex; flex-direction: column; align-items: center; text-align: center; box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1); }
        .card:hover { transform: translateY(-10px); border-color: #555; }
        
        .avatar { width: 90px; height: 90px; background: var(--text-main); color: var(--bg-dark); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: bold; margin-bottom: 1.5rem; font-family: 'Space Grotesk', sans-serif; box-shadow: 0 0 20px rgba(255,255,255,0.1); }
        .team-title { font-weight: 600; color: var(--text-muted); margin-bottom: 1rem; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; }
        
        .social-links { display: flex; gap: 1rem; margin-top: auto; padding-top: 1.5rem; }
        .social-links a { width: 40px; height: 40px; border-radius: 50%; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--text-main); transition: all 0.3s; }
        .social-links a:hover { background: var(--text-main); color: var(--bg-dark); transform: scale(1.1); }

        footer { padding: 4rem 5%; text-align: center; color: var(--text-muted); font-size: 0.95rem; background-color: #000; }
        
        @media (max-width: 768px) { .nav-links { display: none; } }
    </style>
</head>
