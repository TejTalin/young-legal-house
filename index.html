<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Young Legal House | Home</title>

<link rel="stylesheet" href="style.css?v=40">

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

/* ===== FINAL HEADER SYSTEM (ALIGNED + STABLE) ===== /

body {
    padding-top: 120px;
}

/ HEADER WRAPPER /
.ylh-header {
    position: fixed;
    top: 0;
    width: 100%;
    z-index: 9999;
}

/ INNER FLEX SYSTEM /
.ylh-header-inner {
    max-width: 1400px;
    margin: 0 auto;
    padding: 15px 30px;

    display: flex;
    align-items: center;        / KEY ALIGNMENT FIX /
    justify-content: space-between;
}

/ LOGO (ZOOMED + ALIGNED) /
.sticky-logo {
    display: flex;
    align-items: center;
}

.sticky-logo img {
    height: 155px; / zoomed /
    object-fit: contain;
}

body.light-mode .sticky-logo img {
    filter: brightness(0);
}

/ CENTER ISLAND /
.sticky-island {
    flex: 1;
    max-width: 850px;
    margin: 0 40px;

    height: 65px;

    display: flex;
    align-items: center;
    justify-content: space-between;

    padding: 0 35px;

    border-radius: 100px;
    background: rgba(30,30,30,0.9);
    backdrop-filter: blur(30px);
    border: 1px solid rgba(255,255,255,0.1);
}

body.light-mode .sticky-island {
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(0,0,0,0.1);
}

/ TITLE /
.island-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: 2px;
    color: white;
    text-decoration: none;
}

body.light-mode .island-title {
    color: black;
}

/ RIGHT NAV (YOUR REQUIREMENT) /
.island-nav {
    display: flex;
    gap: 25px;
    align-items: center;
    margin-left: auto;
}

.island-nav a,
.island-nav button {
    color: white;
    text-decoration: none;
    font-weight: 600;
    background: none;
    border: none;
    cursor: pointer;
}

body.light-mode .island-nav a,
body.light-mode .island-nav button {
    color: black;
}

/ DROPDOWN /
.menu-wrapper {
    position: relative;
}

.dropdown-menu {
    position: absolute;
    top: 50px;
    right: 0;
    display: none;
    flex-direction: column;
    background: rgba(20,20,20,0.95);
    border-radius: 12px;
    padding: 10px;
    min-width: 160px;
}

.dropdown-menu.show {
    display: flex;
}

.dropdown-menu a {
    padding: 10px;
    text-decoration: none;
    color: white;
}

body.light-mode .dropdown-menu {
    background: rgba(255,255,255,0.95);
}

body.light-mode .dropdown-menu a {
    color: black;
}

/ THEME TOGGLE /
.sticky-theme-toggle {
    width: 60px;
    height: 60px;

    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    cursor: pointer;
}

body.light-mode .sticky-theme-toggle {
    background: rgba(0,0,0,0.05);
    color: black;
}

/ MOBILE */
@media (max-width: 768px) {

    body { padding-top: 140px; }

    .sticky-logo img { height: 100px; }

    .sticky-island {
        margin: 0 10px;
        height: 55px;
        padding: 0 20px;
    }

    .island-title { font-size: 1.1rem; }

    .sticky-theme-toggle {
        width: 45px;
        height: 45px;
    }
}

</style>
</head>

<body class="dark-mode">

<!-- HEADER -->
<div class="ylh-header">
    <div class="ylh-header-inner">

        <a href="index.html" class="sticky-logo">
            <img src="logoylh.png" alt="YLH Logo">
        </a>

        <div class="sticky-island">
            <a href="index.html" class="island-title">YOUNG LEGAL HOUSE</a>

            <nav class="island-nav">
                <a href="blogs.html">Blogs</a>
                <a href="events.html">Events</a>

                <div class="menu-wrapper">
                    <button id="menuToggleBtn"><i class="fas fa-bars"></i></button>

                    <div class="dropdown-menu" id="dropdownMenuContainer">
                        <a href="about.html">About</a>
                        <a href="team.html">Team</a>
                        <a href="join.html">Join Us</a>
                        <a href="contact.html">Contact</a>
                    </div>
                </div>
            </nav>
        </div>

        <button class="sticky-theme-toggle" id="themeToggle">
            <i class="fas fa-moon" id="themeIcon"></i>
        </button>

    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    const menuBtn = document.getElementById('menuToggleBtn');
    const dropMenu = document.getElementById('dropdownMenuContainer');

    menuBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        dropMenu.classList.toggle('show');
    });

    document.addEventListener('click', (e) => {
        if (!dropMenu.contains(e.target) && !menuBtn.contains(e.target)) {
            dropMenu.classList.remove('show');
        }
    });

    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');
    const body = document.body;

    const currentTheme = localStorage.getItem('ylh_theme');

    if (currentTheme === 'light') {
        body.classList.add('light-mode');
        themeIcon.classList.replace('fa-moon', 'fa-sun');
    }

    themeToggle.addEventListener('click', () => {
        if (body.classList.contains('light-mode')) {
            body.classList.remove('light-mode');
            themeIcon.classList.replace('fa-sun', 'fa-moon');
            localStorage.setItem('ylh_theme', 'dark');
        } else {
            body.classList.add('light-mode');
            themeIcon.classList.replace('fa-moon', 'fa-sun');
            localStorage.setItem('ylh_theme', 'light');
        }
    });

});
</script>

<!-- KEEP YOUR EXISTING MAIN + FOOTER BELOW -->

</body>
</html>
