<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Name | Young Legal House</title>
    
    <link rel="stylesheet" href="style.css">
    
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="dark-mode">
    <script>if (localStorage.getItem('ylh-theme') === 'light') document.body.classList.add('light-mode');</script>
    <div class="custom-cursor" id="customCursor"></div>

    <header class="navbar" id="mainNav">
        <div class="nav-container">
            <a href="index.html" class="nav-left"><img src="logoylh.png" alt="YLH Logo" class="nav-logo"></a>
            <a href="index.html" class="nav-center">Young Legal House</a>
            <div class="nav-right">
                <nav class="nav-menu">
                    <a href="blogs.html" class="glass-pill active-nav">Blogs</a>
                    <a href="events.html" class="glass-pill">Events</a>
                    <div class="menu-wrapper">
                        <button class="glass-pill hamburger-btn" id="menuToggle"><i class="fas fa-bars"></i></button>
                        <div class="dropdown-menu glass-card" id="dropdownMenu">
                            <a href="about.html">About</a><a href="team.html">Team</a><a href="join.html">Join Us</a><a href="contact.html">Contact Us</a>
                        </div>
                    </div>
                </nav>
                <button class="theme-btn glass-pill" id="themeToggle"><i class="fas fa-moon" id="themeIcon"></i></button>
            </div>
        </div>
    </header>

    <main class="page-spacing container">
        <h1 class="section-title">Legal Insights & Articles</h1>
        
        <div class="search-container">
            <input type="text" id="blogSearch" class="blog-search" placeholder="Search articles by keyword...">
        </div>

        <div class="filter-container" id="filterContainer">
            <button class="filter-pill active" data-filter="All">All</button>
            <button class="filter-pill" data-filter="Tax">Tax</button>
            <button class="filter-pill" data-filter="TMT">TMT</button>
            <button class="filter-pill" data-filter="Corporate">Corporate</button>
            <button class="filter-pill" data-filter="Litigation">Litigation</button>
            <button class="filter-pill" data-filter="M&A">M&A</button>
            <button class="filter-pill" data-filter="ADR">ADR</button>
            <button class="filter-pill" data-filter="IPR">IPR</button>
            <button class="filter-pill" data-filter="Others">Others</button>
        </div>

        <div class="cards-grid" id="blogsGrid"></div>
    </main>

    <footer>
        <div class="footer-top">
            <div class="footer-links"><a href="privacy.html">Privacy Policy</a><a href="terms.html">Terms of Service</a><a href="cookies.html">Cookie Policy</a><a href="legal.html">Legal</a></div>
            <div class="footer-socials">
                <a href="#" class="soc-icon" style="color: #0077b5;"><i class="fab fa-linkedin"></i></a>
                <a href="#" class="soc-icon" style="color: #e1306c;"><i class="fab fa-instagram"></i></a>
            </div>
        </div>
        <div class="footer-bottom">
            <span class="newsletter">Newsletter: Coming soon stay tuned over here</span>
            <p class="copyright">&copy; 2026 Young Legal House</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="blogs-data.js"></script>
</body>
</html>
